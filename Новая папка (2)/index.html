<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>TumorBoard Urology</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>TumorBoard Urology</h1>
      <p>Пациенты · Кейсы · MDT решения</p>
    </div>
    <button id="newCaseBtn" class="primary">+ Новый</button>
  </header>

  <main class="layout">
    <section class="panel list-panel">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Поиск: диагноз, ID, дата..." />
        <select id="filterDiagnosis">
          <option value="">Все</option>
          <option>Bladder cancer</option>
          <option>Prostate cancer</option>
          <option>RCC</option>
          <option>UTUC</option>
          <option>Testicular tumor</option>
          <option>Adrenal</option>
          <option>Other</option>
        </select>
      </div>
      <div id="caseList" class="case-list"></div>
    </section>

    <section class="panel editor-panel">
      <form id="caseForm">
        <input type="hidden" id="caseId" />
        <div class="form-title">
          <h2 id="formHeading">Новый кейс</h2>
          <span id="saveStatus"></span>
        </div>

        <div class="grid two">
          <label>Patient ID / инициалы<input id="patientIdentifier" required placeholder="Напр. TB-001 / M.L." /></label>
          <label>Дата Tumor Board<input id="tumorBoardDate" type="date" /></label>
          <label>Возраст<input id="age" type="number" min="0" max="120" /></label>
          <label>Пол<select id="sex"><option></option><option>Male</option><option>Female</option></select></label>
          <label>Диагноз<select id="diagnosis">
            <option></option><option>Bladder cancer</option><option>Prostate cancer</option><option>RCC</option><option>UTUC</option><option>Testicular tumor</option><option>Adrenal</option><option>Other</option>
          </select></label>
          <label>Статус<select id="status"><option>New</option><option>Ready for MDT</option><option>Discussed</option><option>Follow-up</option></select></label>
        </div>

        <label>Comorbidities / ECOG<textarea id="comorbidities" rows="2" placeholder="HTN, DM, CKD... ECOG 0-4"></textarea></label>
        <label>Краткий анамнез<textarea id="clinicalSummary" rows="4" placeholder="Главная история болезни, симптомы, prior malignancy..."></textarea></label>
        <label>Лаборатория<textarea id="labs" rows="2" placeholder="Hb, Cr/eGFR, PSA, AFP/bHCG/LDH..."></textarea></label>
        <label>Imaging summary<textarea id="imagingSummary" rows="4" placeholder="CT/MRI/PET: дата, размер, локализация, LN, metastases..."></textarea></label>
        <label>Операции / процедуры<textarea id="procedureHistory" rows="3" placeholder="TURBT, biopsy, nephrectomy, orchiectomy..."></textarea></label>
        <label>Pathology<textarea id="pathology" rows="4" placeholder="Histology, grade, CIS, LVI, margins, molecular..."></textarea></label>
        <label>TNM / Risk group<textarea id="tnmStage" rows="2" placeholder="cT/pT, N, M, grade, risk group..."></textarea></label>
        <label>Вопрос для Tumor Board<textarea id="tumorBoardQuestion" rows="3" placeholder="Напр. cystectomy vs trimodal therapy? Adjuvant therapy?"></textarea></label>
        <label>MDT decision<textarea id="mdtDecision" rows="3" placeholder="Заполняется после обсуждения"></textarea></label>

        <div class="actions">
          <button type="submit" class="primary">Сохранить</button>
          <button type="button" id="copySlidesBtn">Скопировать 2 слайда</button>
          <button type="button" id="exportJsonBtn">Export JSON</button>
          <button type="button" id="deleteBtn" class="danger">Удалить</button>
        </div>
      </form>
    </section>
  </main>

  <template id="caseItemTemplate">
    <article class="case-item">
      <h3></h3>
      <p class="meta"></p>
      <p class="summary"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
